name: Daily SMB Lead Scan

on:
  schedule:
    # 05:00 UTC = 09:00 Asia/Dubai (GST, no DST)
    - cron: "0 5 * * *"
  workflow_dispatch:  # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch Reddit candidates
        run: python3 scripts/fetch_reddit.py > /tmp/posts.json

      - name: Rank and write digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          cat /tmp/posts.json | python3 scripts/rank_and_write.py "leads/${DATE}.md"

      - name: Commit digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leads/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily leads: $(date -u +%Y-%m-%d)"
            git push
          fi
